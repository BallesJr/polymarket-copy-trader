name: copy-trader
on:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"   # every 5 min (Actions minimum), off the top of the hour (less scheduler congestion)
  workflow_dispatch:

concurrency:
  group: copy-trader
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python copy_trader.py --once
      - name: Commit state
        run: |
          git config user.name "copy-bot"
          git config user.email "actions@github.com"
          # skip the commit when the only diff is the last_updated timestamp
          if git diff -- data/copy_state.json | grep '^[+-] ' | grep -qv '"last_updated"'; then
            git add data/copy_state.json
            git commit -m "bot: copy state $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase
            git push
          else
            echo "only last_updated changed, skipping commit"
          fi
